name: collect

on:
  workflow_dispatch:        # manual trigger — use this for the first run
  schedule:
    # GitHub cron is UTC and does NOT observe DST. Retune seasonally.
    # EIA Weekly Petroleum Status posts Wed ~10:30 ET; fetch a bit after.
    # 15:00 UTC = 11:00 ET (EDT) / 10:00 ET (EST).
    - cron: '0 15 * * 3'

permissions:
  contents: write           # required to commit collected data back to this repo

concurrency:
  group: collect
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run collectors
        env:
          EIA_API_KEY: ${{ secrets.EIA_API_KEY }}
        run: python3 scripts/collect.py

      - name: Commit results
        run: |
          git config user.name  "Research-Intake collector"
          git config user.email "actions@github.com"
          git add -A
          git diff --cached --quiet || git commit -m "collect: $(date -u +%Y-%m-%dT%H:%MZ)"
          git push
