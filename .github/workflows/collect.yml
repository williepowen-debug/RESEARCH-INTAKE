name: collect

on:
  workflow_dispatch:        # manual trigger — use this for the first run
  schedule:
    # Weekday-daily. GitHub cron is UTC and does NOT observe DST.
    # 15:00 UTC = 11:00 ET (EDT) / 10:00 ET (EST) — after the morning macro
    # releases (EIA Wed ~10:30 ET, jobless claims Thu 8:30 ET). News + filings
    # are daily signals, so the lane runs every weekday; weekly feeds harmlessly
    # re-fetch the same data between their releases.
    - cron: '0 15 * * 1-5'

permissions:
  contents: write           # required to commit collected data back to this repo

concurrency:
  group: collect
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run collectors
        env:
          EIA_API_KEY: ${{ secrets.EIA_API_KEY }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python3 scripts/collect.py

      - name: Commit results
        run: |
          git config user.name  "Research-Intake collector"
          git config user.email "actions@github.com"
          git add -A
          git diff --cached --quiet || git commit -m "collect: $(date -u +%Y-%m-%dT%H:%MZ)"
          git push
